# SonarQube project configuration
sonar.projectKey=agentic-browser-frontend
sonar.projectName=Agentic Browser Frontend
sonar.projectVersion=1.0.0

# Source and test directories
sonar.sources=src
sonar.tests=tests
sonar.inclusions=**/*.ts,**/*.vue,**/*.js,**/*.jsx
sonar.exclusions=**/node_modules/**,**/dist/**,**/dist-electron/**,**/coverage/**,**/*.d.ts

# TypeScript configuration
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Quality gates and thresholds
sonar.qualitygate.wait=true

# Coverage requirements
sonar.coverage.exclusions=**/*.spec.ts,**/*.test.ts,**/tests/**,**/*.d.ts,**/main.ts,**/vite.config.ts
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts,**/tests/**/*.ts

# Code analysis exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/dist-electron/**,**/coverage/**

# Duplication
sonar.cpd.exclusions=**/*.spec.ts,**/*.test.ts,**/tests/**

# Size metrics
sonar.size.metric=lines

# Language-specific properties
sonar.javascript.file.suffixes=.js,.jsx,.ts,.tsx,.vue
sonar.typescript.file.suffixes=.ts,.tsx,.vue

# Vue.js specific
sonar.vue.file.suffixes=.vue

# Security
sonar.security.hotspots.enabled=true
sonar.security.hotspots.checks=all

# Technical debt
sonar.technicalDebt.hoursInDay=8
sonar.technicalDebt.ratio=10

# Additional parameters
sonar.sourceEncoding=UTF-8
sonar.scm.provider=git
sonar.scm.exclusions.disabled=true
